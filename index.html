async function sbRequest(table, { method = "GET", body, query = "" } = {}) {
  const url = `${SUPABASE_URL}/rest/v1/${table}${query}`;
  const headers = {
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`,
    "Content-Type": "application/json",
  };
  if (method !== "GET") headers["Prefer"] = "return=representation";
  const res = await fetch(url, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const errText = await res.text().catch(() => "");
    throw new Error(`Supabase ${table} ${method} failed: ${res.status} ${errText}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function RankedItemsBreakdown({ sales, emptyText, items }) {
  const costLookup = {};
  (items || []).forEach((it) => {
    if (costLookup[it.name] === undefined) costLookup[it.name] = it.cost || 0;
  });
  const breakdown = {};
  sales.forEach((s) => {
    (s.soldItems || []).forEach((it) => {
      if (!breakdown[it.name]) breakdown[it.name] = { name: it.name, qty: 0, revenue: 0, discount: 0, cost: 0 };
      const lineDiscount = it.discount || 0;
      breakdown[it.name].qty += it.qty;
      breakdown[it.name].revenue += it.qty * it.price - lineDiscount;
      breakdown[it.name].discount += lineDiscount;
      breakdown[it.name].cost += it.qty * (costLookup[it.name] || 0);
    });
  });
  const ranked = Object.values(breakdown).sort((a, b) => b.qty - a.qty);
  const medals = ["🥇", "🥈", "🥉"];
  const maxQty = ranked[0]?.qty || 1;
  const hasCostData = ranked.some((it) => it.cost > 0);

  if (ranked.length === 0) {
    return (
      <div style={{ background: PAPER_RAISED, borderRadius: "18px", border: "none", boxShadow: "0 6px 18px rgba(23,24,28,0.07)", padding: "24px", textAlign: "center", fontSize: "13px", color: "var(--muted)" }}>
        {emptyText}
      </div>
    );
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
      {ranked.map((it, idx) => (
        <div key={it.name} style={{
          background: idx === 0 ? GOLD_SOFT : PAPER_RAISED,
          borderRadius: "12px",
          border: `1.5px solid ${idx === 0 ? GOLD : LINE}`,
          padding: "14px 16px",
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <span style={{ fontSize: "18px" }}>{medals[idx] || `#${idx + 1}`}</span>
              <span style={{ fontFamily: "'Noto Kufi Arabic', sans-serif", fontWeight: 700, fontSize: "14px" }}>{it.name}</span>
            </div>
            <span style={{ fontSize: "13px", fontWeight: 900, color: GOLD }}>{fmt(it.revenue)} د.ع</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
            <div style={{ flex: 1, height: "8px", borderRadius: "4px", background: LINE, overflow: "hidden" }}>
              <div style={{ width: `${(it.qty / maxQty) * 100}%`, height: "100%", background: idx === 0 ? GOLD : TEAL, borderRadius: "4px" }} />
            </div>
            <span style={{ fontSize: "12px", color: "var(--muted)", whiteSpace: "nowrap" }}>{it.qty} دانە فرۆشراوە</span>
          </div>
          <div style={{ fontSize: "11px", color: "var(--muted)", marginTop: "4px" }}>
            🔢 تێکڕای نرخی هەر پارچەیەک: <span style={{ fontWeight: 700, color: INK }}>{fmt(it.revenue / it.qty)}</span> د.ع
          </div>
          {it.discount > 0 && (
            <div style={{ fontSize: "11px", color: RED, marginTop: "4px" }}>🏷️ کۆی داشکاندن: -{fmt(it.discount)} د.ع</div>
          )}
          {it.cost > 0 && (
            <div style={{ fontSize: "11px", color: TEAL, marginTop: "4px", fontWeight: 700 }}>📈 قازانجی ڕاستەقینە: {fmt(it.revenue - it.cost)} د.ع</div>
          )}
        </div>
      ))}
      <div style={{ display: "flex", flexDirection: "column", gap: "4px", background: `linear-gradient(135deg, ${INK} 0%, #20265A 100%)`, color: "#fff", borderRadius: "16px", padding: "14px 18px", marginTop: "4px", boxShadow: "0 8px 20px rgba(23,24,28,0.18)" }}>
        <div style={{ display: "flex", justifyContent: "space-between" }}>
          <span style={{ fontSize: "13px", fontWeight: 700 }}>کۆی گشتی هەموو کاڵاکان</span>
          <span style={{ fontSize: "14px", fontWeight: 900, color: GOLD }}>
            {fmt(ranked.reduce((s, x) => s + x.revenue, 0))} د.ع
          </span>
        </div>
        {hasCostData && (
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <span style={{ fontSize: "11.5px", opacity: 0.85 }}>📈 کۆی قازانجی ڕاستەقینە</span>
            <span style={{ fontSize: "12.5px", fontWeight: 800, color: "#7fe07a" }}>
              {fmt(ranked.reduce((s, x) => s + (x.revenue - x.cost), 0))} د.ع
            </span>
          </div>
        )}

    </div>
  );
}

    const it = items.find((i) => i.id === id);

    const sameGroup = items

      .sort((a, b) => (a.sortOrder ?? 0) - (b.sortOrder ?? 0));
    const idx = sameGroup.findIndex((i) => i.id === id);
    const swapIdx = direction === "up" ? idx - 1 : idx + 1;
    if (swapIdx < 0 || swapIdx >= sameGroup.length) return;
    const other = sameGroup[swapIdx];
    const myOrder = it.sortOrder ?? 0;
    const otherOrder = other.sortOrder ?? 0;
    setItems((prev) => prev.map((i) => {
      if (i.id === it.id) return { ...i, sortOrder: otherOrder };
      if (i.id === other.id) return { ...i, sortOrder: myOrder };
      return i;
    }));
    try {
      await Promise.all([
        sbRequest("items", { method: "PATCH", query: `?id=eq.${it.id}`, body: { sort_order: otherOrder } }),
        sbRequest("items", { method: "PATCH", query: `?id=eq.${other.id}`, body: { sort_order: myOrder } }),

  const matchesPeriod = (date) => {
    if (!date) return true;
    const now = new Date();
    if (periodFilter === "day") {
      return date.getDate() === now.getDate() && date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
    }
    if (periodFilter === "week") {
      const weekStart = new Date(now);
      weekStart.setDate(now.getDate() - now.getDay());
      weekStart.setHours(0, 0, 0, 0);
      return date.getTime() >= weekStart.getTime();
    }
    if (periodFilter === "month") {
      return date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
    }
    if (periodFilter === "year") {
      return date.getFullYear() === now.getFullYear();
    }
    if (periodFilter === "custom") {
      if (!reportDateFrom || !reportDateTo) return false;
      const from = new Date(reportDateFrom); from.setHours(0, 0, 0, 0);
      const to = new Date(reportDateTo); to.setHours(23, 59, 59, 999);
      return date.getTime() >= from.getTime() && date.getTime() <= to.getTime();
    }
    return true; // "all"

              style={{
                width: "100%", padding: "14px", borderRadius: "14px", textAlign: "center",
                fontSize: "22px", letterSpacing: "10px", fontWeight: 800,
                border: `2px solid ${pinError ? RED : LINE}`, marginBottom: pinError ? "8px" : "18px",
              }}
            />
            {pinError && (
              <div style={{ fontSize: "12px", color: RED, fontWeight: 700, marginBottom: "14px" }}>
                کۆدەکە هەڵەیە، دووبارە هەوڵ بدەرەوە
              </div>
            )}
            <div style={{ display: "flex", gap: "8px" }}>
              <button
                onClick={() => { setPinConfirmAction(null); setPinInput(""); setPinError(false); }}
                style={{ flex: 1, padding: "12px", borderRadius: "12px", border: `1px solid ${LINE}`, background: "#fff", color: INK, fontWeight: 700, fontSize: "13px", cursor: "pointer" }}
              >
                پاشگەزبوونەوە
              </button>
              <button
                onClick={confirmPin}
                style={{ flex: 1, padding: "12px", borderRadius: "12px", border: "none", background: RED, color: "#fff", fontWeight: 700, fontSize: "13px", cursor: "pointer" }}
              >
                🗑️ سڕینەوە
              </button>
            </div>
          </div>
        </div>
      )}

      {showConfirm && (
        <div style={{
          position: "fixed", inset: 0, background: "rgba(33,30,26,0.55)", zIndex: 50,
          display: "flex", alignItems: "center", justifyContent: "center", padding: "20px",
        }}>
          <div style={{
            background: PAPER_RAISED, borderRadius: "18px", padding: "24px 22px",
            width: "100%", maxWidth: "380px", boxShadow: "0 24px 60px rgba(0,0,0,0.35)",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "4px" }}>
              <Receipt size={18} color={GOLD} />
              <span style={{ fontFamily: "'Noto Kufi Arabic', sans-serif", fontWeight: 900, fontSize: "16px" }}>
                دڵنیابەرەوە پێش فرۆشتن
              </span>
            </div>
            <div style={{ fontSize: "12px", color: "var(--muted)", marginBottom: "16px" }}>
              تکایە پسوولەکە بە وردی سەیر بکە پێش پەسندکردن
            </div>

            <div style={{ background: "#fff", borderRadius: "12px", border: `1px solid ${LINE}`, padding: "14px", marginBottom: "16px" }}>
              <div style={{ display: "flex", flexDirection: "column", gap: "8px", marginBottom: "10px" }}>
                {cartLines.map((l) => (
                  <div key={l.key} style={{ fontSize: "12.5px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <span>{l.name} <span style={{ color: "var(--muted)" }}>× {l.qty}</span></span>
                      <span style={{ fontWeight: 700 }}>{fmt(l.lineTotal)} د.ع</span>
                    </div>
                    {l.lineDiscount > 0 && (
                      <div style={{ fontSize: "11px", color: RED }}>🏷️ داشکاندن: -{fmt(l.lineDiscount)} د.ع</div>
                    )}
                  </div>
                ))}
              </div>
              <div style={{ borderTop: `1px dashed ${LINE}`, paddingTop: "8px", display: "flex", justifyContent: "space-between", fontSize: "12.5px", color: "var(--muted)" }}>
                <span>کۆی کاڵاکان</span>
                <span>{fmt(cartTotal)} د.ع</span>
              </div>
              {discountAmount > 0 && (
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: "12.5px", color: RED }}>
                  <span>داشکاندن</span>
                  <span>-{fmt(discountAmount)} د.ع</span>
                </div>
              )}
              {saleNote.trim() && (
                <div style={{ marginTop: "8px", fontSize: "12px", color: "var(--muted)" }}>
                  📝 {saleNote.trim()}
                </div>
              )}
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: "6px" }}>
                <span style={{ fontWeight: 800, fontSize: "14px" }}>کۆی گشتی</span>
                <span style={{ fontWeight: 900, fontSize: "18px", color: GOLD }}>{fmt(finalTotal)} د.ع</span>
              </div>
            </div>

            <div style={{ display: "flex", gap: "8px" }}>
              <button
                onClick={() => setShowConfirm(false)}
                style={{ flex: 1, padding: "12px", borderRadius: "12px", border: `1px solid ${LINE}`, background: "#fff", color: INK, fontWeight: 700, fontSize: "13px", cursor: "pointer" }}
              >
                گەڕانەوە بۆ دەستکاری
              </button>
              <button
                onClick={completeSale}
                style={{ flex: 1.4, padding: "12px", borderRadius: "12px", border: "none", background: `linear-gradient(135deg, ${TEAL} 0%, #0E6B49 100%)`, color: "#fff", fontWeight: 700, fontSize: "13px", cursor: "pointer", boxShadow: "0 6px 16px rgba(30,110,92,0.3)" }}
              >
                ✓ دڵنیام، فرۆشتن تەواو بکە
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SystemMockup />);
</script>
</body>
</html>
